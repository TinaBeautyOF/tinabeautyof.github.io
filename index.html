<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TinaBeauty">
  <meta name="theme-color" content="#E8B4B8">
  <title>TinaBeauty</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-content">
      <div class="header-left">
        <button id="back-btn" class="back-btn hidden">&#8249;</button>
        <h1 id="view-title">TinaBeauty</h1>
      </div>
      <div class="header-right">
        <button id="header-action" class="header-btn hidden">+</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main id="content">

    <!-- Accueil -->
    <section id="view-accueil" class="view active">
      <div class="logo-banner">
        <div class="logo-circle">TB</div>
        <p class="logo-tagline">Salon d'esthétique</p>
      </div>
      <div class="section-block">
        <h2 class="section-title">Aujourd'hui</h2>
        <div id="rdv-today" class="rdv-list"><div class="loader">Chargement…</div></div>
      </div>
      <div class="section-block">
        <h2 class="section-title">Demain</h2>
        <div id="rdv-tomorrow" class="rdv-list"><div class="loader">Chargement…</div></div>
      </div>
    </section>

    <!-- Planning -->
    <section id="view-planning" class="view">
      <div class="week-nav">
        <button id="prev-week" class="nav-btn">&#8249;</button>
        <span id="week-label" class="week-label"></span>
        <button id="next-week" class="nav-btn">&#8250;</button>
      </div>
      <div id="day-selector" class="day-selector"></div>
      <div id="day-view" class="day-view">
        <p class="select-day-hint">Sélectionnez un jour</p>
      </div>
    </section>

    <!-- Prestations -->
    <section id="view-prestations" class="view">
      <div class="cat-bar-wrap">
        <div id="cat-bar" class="cat-bar"></div>
        <button id="manage-cats-btn" class="manage-cats-btn" title="Gérer les catégories">Gérer</button>
      </div>
      <div id="prestations-list"></div>
    </section>

    <!-- Clientes -->
    <section id="view-clientes" class="view">
      <div class="search-bar">
        <input type="search" id="search-clientes" placeholder="Rechercher une cliente…" autocomplete="off">
      </div>
      <!-- Android : Contact Picker API -->
      <button id="import-contacts-btn" class="import-contacts-btn hidden">
        Importer depuis mes contacts
      </button>
      <!-- iOS : import fichier vCard -->
      <label id="import-vcf-label" class="import-contacts-btn hidden">
        Importer un fichier vCard (.vcf)
        <input type="file" id="import-vcf-input" accept=".vcf,text/vcard" style="display:none">
      </label>
      <div id="clientes-list"></div>
      <button id="export-btn" class="export-btn">Exporter tout l'historique (CSV)</button>
    </section>

    <!-- Historique -->
    <section id="view-historique" class="view">
      <div class="info-card" id="historique-info"></div>
      <h2 class="section-title">Historique des rendez-vous</h2>
      <div id="historique-list"></div>
    </section>

    <!-- Finances -->
    <section id="view-finances" class="view">
      <div class="finances-tabs">
        <button class="finances-tab active" data-fin="achats">Achats</button>
        <button class="finances-tab" data-fin="chiffres">Chiffre d'affaire</button>
      </div>
      <div id="finances-achats" class="finances-panel active">
        <div id="achats-list"></div>
        <button id="add-achat-btn" class="finances-fab">+ Ajouter un achat</button>
      </div>
      <div id="finances-chiffres" class="finances-panel">
        <div id="chiffres-list"></div>
      </div>
    </section>

  </main>

  <!-- TAB BAR -->
  <nav class="tab-bar">
    <button class="tab active" data-view="accueil">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Accueil</span>
    </button>
    <button class="tab" data-view="planning">
      <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
      <span>Planning</span>
    </button>
    <button class="tab" data-view="prestations">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      <span>Prestations</span>
    </button>
    <button class="tab" data-view="clientes">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>Clientes</span>
    </button>
    <button class="tab" data-view="finances">
      <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
      <span>Finances</span>
    </button>
  </nav>

</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Nouveau</h3>
      <button class="modal-close" id="modal-close" aria-label="Fermer">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button id="modal-delete" class="btn-danger hidden">Supprimer</button>
      <button id="modal-save" class="btn-primary">Enregistrer</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
